# THE OBSIDIAN GLASS MAINFRAME - HYPRLOCK CONFIG
# Ubicación: ~/.config/hypr/hyprlock.conf

general {
    no_fade_in = true
    no_fade_out = true
    hide_cursor = true
    grace = 0
    disable_loading_bar = true
}

# FONDO: Negro Obsidiana sólido (#050505)
background {
    monitor =
    path = /home/gerardo0/.config/hypr/background.png   # O usa una imagen: path = /ruta/a/tu/fondo_hacker.png
    color = rgba(5, 5, 5, 1.0)
    
    # Blur para simular el cristal si usas screenshot
    blur_passes = 2
    blur_size = 4
    noise = 0.05
    contrast = 1.3
    brightness = 0.5
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

# HORA (Reloj Principal)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M:%S")"
    color = rgba(255, 255, 255, 1.0)
    font_size = 90
    font_family = JetBrains Mono ExtraBold
    position = 0, 150
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgb(0,0,0)
}

# Header de Seguridad
label {
    monitor =
    text = /// UNAUTHORIZED ACCESS PROHIBITED ///
    color = rgba(77, 85, 102, 1.0) # Gris técnico
    font_size = 12
    font_family = JetBrains Mono
    position = 0, 80
    halign = center
    valign = center
    letter_spacing = 2
}

# Sub-Header
label {
    monitor =
    text = SECURE_SHELL_V4.0 // HYPRLOCK_INSTANCE_01
    color = rgba(77, 85, 102, 0.6)
    font_size = 10
    font_family = JetBrains Mono
    position = 0, 50
    halign = center
    valign = center
}

# INPUT FIELD (La consola central)
input-field {
    monitor =
    size = 400, 60
    outline_thickness = 2
    dots_size = 0.25      # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2    # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    dots_rounding = -1    # -1 default circle, -2 follow input-field rounding
    outer_color = rgb(51, 255, 0) # Verde Neón
    inner_color = rgba(0, 0, 0, 0.85) # Negro semi-transparente
    font_color = rgb(51, 255, 0)
    fade_on_empty = false
    font_family = JetBrains Mono
    placeholder_text = <span foreground="##33FF00">locked@archlinux</span> <span foreground="##FFFFFF">~</span> <span foreground="##4D5566">$</span>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
    zindex = 10
}

# COLUMNA IZQUIERDA (Datos simulados estáticos para estética)
label {
    monitor =
    text = cmd[update:100000] echo -e "INIT_KERNEL... [OK]\nMOUNT_VFS... [OK]\nCHECK_INTEGRITY... [PASS]\nLOAD_MODULE_CRYPTO... [OK]\nBYPASS_FIREWALL... [ACTIVE]\nSTART_DAEMON_SSH... [OK]\nALLOCATE_PAGES... [DONE]\nSCAN_PCI_BUS... [FOUND]\nDETECT_GPU_0... [NVIDIA_H100]\nINIT_HYPRLAND... [OK]"
    color = rgba(77, 85, 102, 0.5)
    font_size = 10
    font_family = JetBrains Mono
    position = 50, 0
    halign = left
    valign = center
}

# COLUMNA DERECHA (Memory Dump simulado)
label {
    monitor =
    text = cmd[update:1000] echo -e "0x004F3A :: [ALLOC]\n0x00A1B2 :: [FREE]\n0xFF9900 :: [RESERVED]\nMEM_USAGE :: $(free -h | awk '/^Mem/ {print $3 "/" $2}')\nSWAP :: ENABLED\nUPTIME :: $(uptime -p | cut -d ' ' -f 2-)"
    color = rgba(77, 85, 102, 0.5)
    font_size = 10
    font_family = JetBrains Mono
    position = -50, 0
    halign = right
    valign = center
}

# PIE DE PÁGINA
label {
    monitor =
    text = Sys_Op: Active | Net_Stat: Encrypted | Session: #99FA1
    color = rgba(77, 85, 102, 1.0)
    font_size = 9
    font_family = JetBrains Mono
    position = 0, -100
    halign = center
    valign = center
}
